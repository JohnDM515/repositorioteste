<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div class="row">

    <!-- Produto 1 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Notebook</h5>
          <p class="card-text">Notebook ideal para estudos e trabalho.</p>
          <p><strong>R$ 3500,00</strong></p>

          <div class="form-check mb-2">
            <input type="checkbox"
                   class="form-check-input item-produto"
                   value="3500.00"
                   id="produto1">
            <label class="form-check-label" for="produto1">
              Selecionar produto
            </label>
          </div>

          <label class="form-label">Quantidade</label>
          <input type="number"
                 class="form-control qtd-produto"
                 value="1"
                 min="1">
        </div>
      </div>
    </div>

    <!-- Produto 2 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Smartphone</h5>
          <p class="card-text">Smartphone com ótima câmera e desempenho.</p>
          <p><strong>R$ 2200,00</strong></p>

          <div class="form-check mb-2">
            <input type="checkbox"
                   class="form-check-input item-produto"
                   value="2200.00"
                   id="produto2">
            <label class="form-check-label" for="produto2">
              Selecionar produto
            </label>
          </div>

          <label class="form-label">Quantidade</label>
          <input type="number"
                 class="form-control qtd-produto"
                 value="1"
                 min="1">
        </div>
      </div>
    </div>

    <!-- Produto 3 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Headset Gamer</h5>
          <p class="card-text">Headset com som imersivo e microfone HD.</p>
          <p><strong>R$ 450,00</strong></p>

          <div class="form-check mb-2">
            <input type="checkbox"
                   class="form-check-input item-produto"
                   value="450.00"
                   id="produto3">
            <label class="form-check-label" for="produto3">
              Selecionar produto
            </label>
          </div>

          <label class="form-label">Quantidade</label>
          <input type="number"
                 class="form-control qtd-produto"
                 value="1"
                 min="1">
        </div>
      </div>
    </div>

  </div>

  <!-- Valor Total -->
  <div class="alert alert-info text-center mt-4">
    <h4 class="mb-0">
      Valor Total: R$ <span id="valor-total">0,00</span>
    </h4>
  </div>

</div>

</body>
</html>
